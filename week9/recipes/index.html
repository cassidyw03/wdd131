<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="W9-Flexbox Recipe Book">
    <meta name="author" content="Cassidy Whitehead">
    <title>Recipe Book</title>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A recipe book featuring simple, delicious recipes like our classic Apple Crisp.">
    <meta property="og:url" content="https://cassidyw03.github.io/wdd131/week9/recipes/">
    <meta property="og:image" content="https://cassidyw03.github.io/wdd131/week9/recipes/images/recipe-social-preview.png">

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A recipe book featuring simple, delicious recipes like our classic Apple Crisp.">
    <meta name="twitter:image" content="https://cassidyw03.github.io/wdd131/week9/recipes/images/recipe-social-preview.png">

    <!-- Once favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- Google Fonts: Amatic SC for headlines -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
</head>
<body>

    <header>
        <div class="logo-title">
            <img src="images/recipe-book.png" alt="Recipe Book logo" class="logo">
            <h1>Recipe Book</h1>
        </div>
        <form class="search" action="#" method="get">
            <input id="search" type="text" name="search" placeholder="Find a recipe" aria-label="Search recipes">
            <button type="submit" aria-label="Search">
                <img src="images/search.svg" alt="">
            </button>
        </form>
    </header>

    <hr>

    <main>
        <div class="recipe-container">

        </div>
    </main>

    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>

        <p class="attribution">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
        </p>
    </footer>

</body>
</html>
