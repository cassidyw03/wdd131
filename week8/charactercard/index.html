  <!-- Open Graph (Facebook, LinkedIn, etc.) -->

  <meta property="og:description" content="A character card for Snortleblat!">

  <!-- One favicon (ICO works everywhere) -->

  <!-- One Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="stylesheet" href="char.css">
  <script src="char.js" defer></script>
</head>

<body>

  <div class="card">
    <img class="image" id="image" alt="">
    <h1 class="name" id="name"></h1>

    <div class="stats">
      <p><strong>Class:</strong> <span id="class"></span></p>
      <p><strong>Level:</strong> <span id="level"></span></p>
      <p><strong>Health:</strong> <span id="health"></span></p>
    </div>

    <div class="buttons">
      <button id="attacked">Attacked</button>
      <button id="levelUp">Level Up</button>
    </div>
    
  </div>

</body>
